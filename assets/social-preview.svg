<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#000"/>

  <!-- Subtle grid -->
  <g stroke="#0A0A0A" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Left: Terminal block -->
  <g transform="translate(64, 100)">
    <rect width="380" height="260" fill="#050505" stroke="#1A1A1A" stroke-width="1"/>
    <rect width="380" height="1" fill="#222"/>
    <rect y="28" width="380" height="1" fill="#111"/>
    <!-- Top accent -->
    <rect width="380" height="2" fill="url(#grad)" opacity="0.5"/>
    <text x="14" y="19" font-family="'SF Mono', monospace" font-size="11" fill="#444">terminal</text>

    <text x="14" y="54" font-family="'SF Mono', monospace" font-size="12" fill="#333">$</text>
    <text x="26" y="54" font-family="'SF Mono', monospace" font-size="12" fill="#CCC"> claude</text>
    <text x="14" y="80" font-family="'SF Mono', monospace" font-size="12" fill="#3B82F6">&gt;</text>
    <text x="28" y="80" font-family="'SF Mono', monospace" font-size="12" fill="#E5E5E5"> Build a login feature</text>

    <rect x="14" y="99" width="4" height="4" fill="#3B82F6" opacity="0.7"/>
    <text x="26" y="106" font-family="'SF Mono', monospace" font-size="11" fill="#444">Analyzing requirements</text>
    <rect x="14" y="119" width="4" height="4" fill="#3B82F6" opacity="0.7"/>
    <text x="26" y="126" font-family="'SF Mono', monospace" font-size="11" fill="#444">Generating spec REQ-AUTH-001</text>
    <rect x="14" y="139" width="4" height="4" fill="#8B5CF6" opacity="0.7"/>
    <text x="26" y="146" font-family="'SF Mono', monospace" font-size="11" fill="#444">Designing architecture</text>
    <rect x="14" y="159" width="4" height="4" fill="#8B5CF6" opacity="0.7"/>
    <text x="26" y="166" font-family="'SF Mono', monospace" font-size="11" fill="#444">Spawning coder agent</text>
    <rect x="14" y="179" width="4" height="4" fill="#EC4899" opacity="0.7"/>
    <text x="26" y="186" font-family="'SF Mono', monospace" font-size="11" fill="#444">Spawning reviewer agent</text>
    <rect x="14" y="199" width="4" height="4" fill="#22C55E" opacity="0.7"/>
    <text x="26" y="206" font-family="'SF Mono', monospace" font-size="11" fill="#CCC">Done. 4 files changed.</text>

    <rect x="14" y="234" width="352" height="2" fill="#111"/>
    <rect x="14" y="234" width="352" height="2" fill="url(#barGrad)" opacity="0.6"/>
  </g>

  <!-- Right: Pipeline flow -->
  <g transform="translate(836, 100)">
    <rect width="380" height="260" fill="#050505" stroke="#1A1A1A" stroke-width="1"/>
    <rect width="380" height="1" fill="#222"/>
    <rect y="28" width="380" height="1" fill="#111"/>
    <rect width="380" height="2" fill="url(#grad)" opacity="0.5"/>
    <text x="14" y="19" font-family="'SF Mono', monospace" font-size="11" fill="#444">pipeline</text>

    <!-- Row 1: Spec -> Design -> Code -->
    <g transform="translate(30, 60)">
      <polygon points="40,0 70,-18 100,0 70,18" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
      <text x="70" y="5" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#3B82F6">SPEC</text>
      <line x1="100" y1="0" x2="140" y2="0" stroke="#1A1A1A" stroke-width="1"/>
      <polygon points="140,0 170,-18 200,0 170,18" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="170" y="5" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#8B5CF6">DESIGN</text>
      <line x1="200" y1="0" x2="240" y2="0" stroke="#1A1A1A" stroke-width="1"/>
      <polygon points="240,0 270,-18 300,0 270,18" fill="none" stroke="#EC4899" stroke-width="1.5"/>
      <text x="270" y="5" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#EC4899">CODE</text>
    </g>

    <!-- Connector -->
    <line x1="300" y1="78" x2="300" y2="120" stroke="#1A1A1A" stroke-width="1"/>

    <!-- Row 2: Commit <- Review <- Test -->
    <g transform="translate(30, 130)">
      <polygon points="40,0 70,-18 100,0 70,18" fill="none" stroke="#22C55E" stroke-width="1.5"/>
      <text x="70" y="5" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#22C55E">COMMIT</text>
      <line x1="100" y1="0" x2="140" y2="0" stroke="#1A1A1A" stroke-width="1"/>
      <polygon points="140,0 170,-18 200,0 170,18" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
      <text x="170" y="5" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#F59E0B">REVIEW</text>
      <line x1="200" y1="0" x2="240" y2="0" stroke="#1A1A1A" stroke-width="1"/>
      <polygon points="240,0 270,-18 300,0 270,18" fill="none" stroke="#F97316" stroke-width="1.5"/>
      <text x="270" y="5" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#F97316">TEST</text>
    </g>

    <line x1="14" y1="200" x2="366" y2="200" stroke="#111" stroke-width="0.5"/>
    <text x="190" y="224" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#333">AI leads every step</text>
    <text x="190" y="244" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#333">Human makes decisions</text>
  </g>

  <!-- Title -->
  <text x="640" y="448" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="80" font-weight="900" fill="white" letter-spacing="8">
    YAMASAKI
  </text>

  <!-- Subtitle -->
  <text x="640" y="496" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="17" fill="#666">
    AI-Led Dev Framework for Claude Code
  </text>

  <!-- Tags (colored borders) -->
  <g transform="translate(640, 556)">
    <rect x="-292" y="-14" width="144" height="28" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
    <text x="-220" y="5" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#3B82F6" opacity="0.8">SPEC-FIRST</text>

    <rect x="-72" y="-14" width="144" height="28" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#8B5CF6" opacity="0.8">AGENT TEAMS</text>

    <rect x="148" y="-14" width="144" height="28" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.5"/>
    <text x="220" y="5" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#22C55E" opacity="0.8">SECURE</text>
  </g>

  <!-- Top gradient line -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#grad)" opacity="0.6"/>
</svg>
