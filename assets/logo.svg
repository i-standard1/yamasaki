<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect width="512" height="512" fill="#000"/>

  <!-- Outer hex -->
  <polygon points="256,32 480,164 480,348 256,480 32,348 32,164" fill="none" stroke="#151515" stroke-width="1"/>

  <!-- Structure lines -->
  <line x1="256" y1="32" x2="256" y2="480" stroke="#0C0C0C" stroke-width="0.5"/>
  <line x1="32" y1="256" x2="480" y2="256" stroke="#0C0C0C" stroke-width="0.5"/>

  <!-- Central diamond with gradient stroke -->
  <polygon points="256,176 336,256 256,336 176,256" fill="none" stroke="url(#grad)" stroke-width="3"/>
  <polygon points="256,216 296,256 256,296 216,256" fill="url(#grad)" opacity="0.06"/>

  <!-- Radiating lines (colored) -->
  <line x1="256" y1="176" x2="256" y2="72" stroke="#3B82F6" stroke-width="1.5" opacity="0.3"/>
  <line x1="336" y1="256" x2="440" y2="256" stroke="#8B5CF6" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="336" x2="256" y2="440" stroke="#EC4899" stroke-width="1.5" opacity="0.3"/>
  <line x1="176" y1="256" x2="72" y2="256" stroke="#3B82F6" stroke-width="1.5" opacity="0.3"/>

  <!-- Endpoint diamonds (colored) -->
  <polygon points="256,64 260,72 256,80 252,72" fill="#3B82F6" opacity="0.6"/>
  <polygon points="440,248 448,256 440,264 432,256" fill="#8B5CF6" opacity="0.6"/>
  <polygon points="256,432 260,440 256,448 252,440" fill="#EC4899" opacity="0.6"/>
  <polygon points="72,248 80,256 72,264 64,256" fill="#3B82F6" opacity="0.6"/>

  <!-- Terminal prompt -->
  <text x="232" y="265" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="30" fill="white" font-weight="700">&gt;_</text>
</svg>
